<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CareHub · DeEtte</title>
<style>
  :root{
    --bg:#fffdf4; --card:#ffffff; --border:#f0e6cc;
    --text:#44403c; --head:#292524; --muted:#78716c; --faint:#a8a29e; --stone100:#f5f3ec;
    --gold:#d97706; --gold-dark:#b45309; --gold-text:#b45309; --sun:#fbbf24;
    --gold-bg:#fffbeb; --gold-bd:#fde68a;
    --green:#16a34a; --green-bg:#f0fdf4; --green-bd:#bbf7d0;
    --warn:#ea580c; --warn-text:#9a3412; --warn-bg:#fff7ed; --warn-bd:#fed7aa;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.45}
  .wrap{max-width:640px;margin:0 auto;padding:24px 16px 120px}
  .topbar{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px}
  .brand{display:flex;align-items:center;gap:10px}
  .logo{display:flex;height:38px;width:38px;align-items:center;justify-content:center;border-radius:12px;
    background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,.35)}
  h1{font-size:20px;font-weight:700;letter-spacing:-.01em;margin:0;color:var(--head)}
  .sub{margin:4px 0 0;font-size:14px;color:var(--muted)}
  .topright{text-align:right;font-size:14px}
  .topright .d{font-weight:600;color:var(--text);margin:0}
  .topright .m{font-size:12px;color:var(--faint);margin:2px 0 0}
  @media(max-width:560px){.topright{display:none}}

  .hero{position:relative;overflow:hidden;border:1px solid var(--gold-bd);border-radius:20px;padding:22px 22px 24px;margin-bottom:18px;
    background:linear-gradient(135deg,#fef3c7 0%,#fffaf0 65%)}
  .hero h2{margin:0;font-size:19px;font-weight:700;color:var(--head)}
  .hero p{margin:6px 0 0;font-size:14px;color:#6b5b3e;max-width:80%}
  .hero .sundeco{position:absolute;right:-16px;top:-16px;color:var(--sun);opacity:.85}

  .card{border:1px solid var(--border);background:var(--card);border-radius:16px;padding:20px;box-shadow:0 1px 2px rgba(120,90,20,.05);margin-bottom:14px}
  .card.flush{padding:0}
  .card.warm{background:var(--gold-bg);border-color:var(--gold-bd)}
  .card.warn{background:var(--warn-bg);border-color:var(--warn-bd)}
  .card.click{cursor:pointer;transition:box-shadow .15s,transform .1s}
  .card.click:hover{box-shadow:0 6px 18px rgba(180,130,30,.12)}
  .sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--gold-text);margin:24px 2px 10px}
  .sec.first{margin-top:2px}
  .muted{color:var(--muted)} .faint{color:var(--faint)} .sm{font-size:14px}
  .row{display:flex;align-items:center;gap:12px}
  .grow{flex:1}
  .right{text-align:right}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  .stat-label{display:flex;align-items:center;gap:6px;color:var(--gold-text);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
  .stat-num{font-size:30px;font-weight:700;color:var(--head);margin:8px 0 4px}
  .stat-sub{font-size:12px;color:var(--muted);margin:0}
  .pill{display:inline-block;border-radius:999px;background:var(--gold-bg);color:var(--gold-text);border:1px solid var(--gold-bd);font-size:12px;font-weight:600;padding:4px 12px;white-space:nowrap}
  .tag{display:inline-block;border-radius:999px;background:var(--stone100);color:var(--muted);font-size:12px;font-weight:500;padding:2px 10px}
  .avatar{display:flex;height:36px;width:36px;align-items:center;justify-content:center;border-radius:999px;font-size:12px;font-weight:700;flex:0 0 auto}
  .av-D{background:#ffedd5;color:#c2410c}.av-S{background:#ede9fe;color:#6d28d9}.av-Y{background:#fef3c7;color:#b45309}
  .upd{display:flex;gap:12px;margin-bottom:12px}
  .upd:last-child{margin-bottom:0}
  .name{font-weight:600;color:var(--head)}
  .when{color:var(--faint)}

  .med{display:flex;align-items:center;gap:16px;border:1px solid var(--border);background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:12px;cursor:pointer;transition:border-color .15s,background .15s}
  .med:hover{border-color:var(--gold-bd)}
  .med.on{background:var(--green-bg);border-color:var(--green-bd)}
  .check{display:flex;height:36px;width:36px;align-items:center;justify-content:center;border-radius:999px;border:1px solid #ddd6c4;color:transparent;flex:0 0 auto}
  .med.on .check{background:var(--green);border-color:var(--green);color:#fff}
  .med-name{margin:0;font-weight:600;color:var(--head)}
  .time{display:flex;align-items:center;justify-content:flex-end;gap:4px;font-size:14px;font-weight:500;color:var(--muted);margin:0}
  .refill{font-size:12px;color:var(--faint);margin:2px 0 0}
  .refill.low{color:var(--warn);font-weight:700}

  .list .item{display:flex;align-items:center;gap:12px;padding:16px 18px;border-top:1px solid #f4efe2;cursor:pointer;text-align:left;width:100%;background:none;border-left:0;border-right:0;border-bottom:0;font:inherit}
  .list .item:first-child{border-top:0}
  .list .item:hover{background:#fffaf0}
  .box{display:flex;height:24px;width:24px;align-items:center;justify-content:center;border-radius:6px;border:1px solid #ddd6c4;color:transparent;flex:0 0 auto}
  .item.done .box{background:var(--gold);border-color:var(--gold);color:#fff}
  .item.done .txt{color:var(--faint);text-decoration:line-through}
  .txt{flex:1;font-size:14px;color:var(--text)}

  .qbox{margin-top:12px;border-radius:12px;background:#fdf8ec;padding:12px}
  .qbox p{margin:0 0 4px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--gold-text)}
  .qbox li{font-size:14px;color:var(--muted);list-style:none;margin:2px 0}
  .qbox ul{margin:0;padding:0}

  textarea{width:100%;resize:none;border:1px solid var(--border);border-radius:12px;padding:12px;font:inherit;font-size:14px;color:var(--text);background:#fffdf8}
  textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 1px var(--gold)}
  .btn{border:0;border-radius:12px;background:var(--gold);color:#fff;font:inherit;font-size:14px;font-weight:600;padding:10px 16px;cursor:pointer}
  .btn:hover{background:var(--gold-dark)}
  .btn-row{display:flex;justify-content:flex-end;margin-top:8px}
  .link{display:inline-flex;align-items:center;gap:4px;border:0;background:none;color:var(--gold-text);font:inherit;font-size:12px;font-weight:700;cursor:pointer;padding:0}
  .sec-row{display:flex;align-items:center;justify-content:space-between}

  .irow{display:flex;align-items:center;gap:12px;margin-bottom:12px}
  .irow:last-child{margin-bottom:0}
  .ibadge{display:flex;height:32px;width:32px;align-items:center;justify-content:center;border-radius:10px;background:var(--gold-bg);color:var(--gold-text);flex:0 0 auto}
  .ilabel{margin:0;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--faint)}
  .ival{margin:0;font-size:14px;font-weight:500;color:var(--text)}
  .chk-line{display:flex;align-items:center;gap:12px;padding:16px 18px;border-top:1px solid #f4efe2;font-size:14px;color:var(--text);cursor:pointer}
  .chk-line:first-child{border-top:0}
  .chk-line input{height:18px;width:18px;accent-color:var(--gold)}

  .res{display:flex;align-items:center;gap:14px;padding:16px 18px;border-top:1px solid #f4efe2}
  .res:first-child{border-top:0}
  .res .rtitle{margin:0;font-weight:600;color:var(--head);font-size:14px}
  .res .rsub{margin:2px 0 0;font-size:13px;color:var(--muted)}
  .rbtn{border:1px solid var(--gold-bd);color:var(--gold-text);background:var(--gold-bg);border-radius:10px;padding:8px 14px;font-size:13px;font-weight:700;text-decoration:none;white-space:nowrap}
  .rbtn:hover{background:#fef3c7}
  .nudge{margin-top:12px;border-radius:12px;background:#fff7ed;border:1px solid var(--warn-bd);padding:12px;font-size:13px;color:var(--warn-text)}
  .event{border-color:var(--gold-bd);background:linear-gradient(135deg,#fffaf0,#ffffff)}
  .event-top{display:flex;gap:14px;align-items:center}
  .event-date{display:flex;flex-direction:column;align-items:center;justify-content:center;width:54px;height:60px;border-radius:14px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;flex:0 0 auto;box-shadow:0 2px 8px rgba(245,158,11,.32)}
  .event-date .mon{font-size:11px;font-weight:700;letter-spacing:.08em}
  .event-date .day{font-size:22px;font-weight:800;line-height:1.05}
  .event-title{margin:0;font-weight:700;color:var(--head);font-size:16px}
  .event-meta{margin:3px 0 0;font-size:13px;color:var(--gold-text);font-weight:600}
  .event-row{display:flex;align-items:flex-start;gap:10px;margin-top:12px;font-size:14px;color:var(--text)}
  .event-row svg{color:var(--gold-text);flex:0 0 auto;margin-top:1px}
  .event-desc{margin:12px 0 0;font-size:13px;color:var(--muted)}
  .event-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}

  .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .cal-title{font-size:17px;font-weight:700;color:var(--head)}
  .cal-nav{display:flex;gap:8px}
  .cal-nav button{height:34px;width:34px;border:1px solid var(--border);background:#fff;border-radius:10px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}
  .cal-nav button:hover{background:var(--gold-bg);color:var(--gold-text)}
  .grid7{display:grid;grid-template-columns:repeat(7,1fr);gap:5px}
  .wd{text-align:center;font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.04em;padding-bottom:4px}
  .cell{position:relative;min-height:84px;border-radius:12px;border:1px solid transparent;background:#fff;padding:5px 5px 4px;cursor:pointer;transition:background .12s;display:flex;flex-direction:column;gap:2px;overflow:hidden}
  .cell:hover{background:var(--gold-bg)}
  .cell.blank{background:transparent;cursor:default;border:0}
  .cell.blank:hover{background:transparent}
  .cell .num{font-size:13px;font-weight:600;color:var(--text)}
  .cell.today{border-color:var(--gold)}
  .cell.today .num{color:var(--gold-text);font-weight:800}
  .cell.sel{background:linear-gradient(135deg,#fef3c7,#fde68a);border-color:var(--gold-bd)}
  .dots{position:absolute;left:6px;right:6px;bottom:6px;display:flex;gap:3px;flex-wrap:wrap}
  .cdot{height:6px;width:6px;border-radius:999px}
  .chip{font-size:10px;line-height:1.25;border-left:3px solid #ccc;background:#faf7f0;border-radius:3px;padding:1px 4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text)}
  .chipmore{font-size:10px;color:var(--faint);font-weight:700;padding-left:4px;margin-top:1px}
  .agday{font-size:13px;font-weight:700;color:var(--head);margin:18px 2px 8px}
  .agday-sel{color:var(--gold-text)}
  .cal-person{display:flex;align-items:center;gap:11px;padding:12px 0;border-top:1px solid #f4efe2}
  .cal-person:first-child{border-top:0}
  .dot{height:12px;width:12px;border-radius:999px;flex:0 0 auto}
  .pname{font-weight:600;color:var(--head);font-size:14px;margin:0}
  .psub{font-size:12px;color:var(--faint);margin:1px 0 0}
  .toggle{border:1px solid var(--border);background:#fff;border-radius:999px;padding:6px 13px;font-size:12px;font-weight:700;color:var(--muted);cursor:pointer}
  .toggle.on{background:var(--gold-bg);border-color:var(--gold-bd);color:var(--gold-text)}
  .toggle.off{opacity:.6}
  .ev{display:flex;gap:12px;padding:12px 14px;border-radius:12px;background:#fff;border:1px solid var(--border);margin-bottom:10px}
  .ev .bar{width:4px;border-radius:999px;flex:0 0 auto}
  .ev .etime{font-size:12px;color:var(--muted);font-weight:700;margin:0}
  .ev .etitle{font-size:14px;color:var(--head);font-weight:500;margin:2px 0 0}
  .ev .ewho{font-size:12px;color:var(--faint);margin:2px 0 0}
  .sync-banner{margin-top:12px;border-radius:12px;background:var(--gold-bg);border:1px solid var(--gold-bd);padding:13px;font-size:13px;color:#6b5b3e}
  .ben{border:1px solid var(--border);background:#fff;border-radius:16px;padding:16px 18px;margin-bottom:12px}
  .ben-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .ben-title{margin:0;font-weight:600;color:var(--head);font-size:15px}
  .star{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:700;color:var(--gold-text);background:var(--gold-bg);border:1px solid var(--gold-bd);border-radius:999px;padding:2px 8px;margin-left:8px;white-space:nowrap}
  .ben-desc{margin:9px 0 0;font-size:13px;color:var(--muted);line-height:1.55}
  .ben-note{margin:9px 0 0;font-size:12px;color:var(--gold-text);font-weight:600}
  .ben-act{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
  .st{border-radius:999px;padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;border:1px solid transparent;white-space:nowrap}
  .st-todo{background:#f5f3ec;color:#78716c;border-color:#e7e1d2}
  .st-look{background:#fffbeb;color:#b45309;border-color:#fde68a}
  .st-applied{background:#ede9fe;color:#6d28d9;border-color:#ddd6fe}
  .st-approved{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
  .st-na{background:#f8f8f7;color:#a8a29e;border-color:#eeeae0}
  nav{position:fixed;left:0;right:0;bottom:0;border-top:1px solid var(--border);background:rgba(255,253,244,.93);backdrop-filter:blur(8px)}
  .navinner{max-width:640px;margin:0 auto;display:flex}
  .navbtn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:11px 0;border:0;background:none;cursor:pointer;color:var(--faint);font:inherit;font-size:11px;font-weight:600}
  .navbtn:hover{color:var(--muted)}
  .navbtn.active{color:var(--gold)}
  .navbtn span{display:block}
  @media(max-width:560px){.navbtn span{display:none}}
  .hint{font-size:12px;color:var(--faint);margin:8px 2px 0}
</style>
</head>
<body>
<div id="gate" style="position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(135deg,#fef3c7 0%,#fffaf0 65%)">
  <div style="width:100%;max-width:340px;text-align:center;background:#fff;border:1px solid #fde68a;border-radius:20px;padding:32px 24px;box-shadow:0 8px 30px rgba(180,130,30,.15)">
    <div style="display:flex;height:48px;width:48px;margin:0 auto 14px;align-items:center;justify-content:center;border-radius:14px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#fff;box-shadow:0 2px 8px rgba(245,158,11,.35)">
      <svg xmlns="http://www.w3.org/2000/svg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </div>
    <h1 style="font-size:20px;font-weight:700;color:#292524;margin:0 0 4px">CareHub</h1>
    <p style="font-size:14px;color:#78716c;margin:0 0 18px">Enter the password to continue</p>
    <input id="gate-pw" type="password" autofocus placeholder="Password" style="width:100%;font-size:16px;padding:12px 14px;border:1px solid #f0e6cc;border-radius:12px;outline:none;text-align:center" />
    <p id="gate-err" style="font-size:13px;color:#dc2626;margin:10px 0 0;min-height:18px;visibility:hidden">Incorrect password — try again</p>
    <button id="gate-btn" style="width:100%;margin-top:12px;font-size:15px;font-weight:600;padding:12px;border:none;border-radius:12px;cursor:pointer;color:#fff;background:linear-gradient(135deg,#fbbf24,#f59e0b)">Open</button>
  </div>
</div>
<script>
(function(){
  var PW='yellow', gate=document.getElementById('gate'), inp=document.getElementById('gate-pw'), err=document.getElementById('gate-err');
  document.body.style.overflow='hidden';
  function tryOpen(){
    if(inp.value.toLowerCase().trim()===PW){gate.parentNode.removeChild(gate);document.body.style.overflow='';}
    else{err.style.visibility='visible';inp.value='';inp.focus();}
  }
  document.getElementById('gate-btn').addEventListener('click',tryOpen);
  inp.addEventListener('keydown',function(e){if(e.key==='Enter')tryOpen();});
})();
</script>
<div class="wrap">
  <div class="topbar">
    <div>
      <div class="brand">
        <span class="logo"></span>
        <h1>DeEtte&rsquo;s CareHub</h1>
      </div>
      <p class="sub">Caring for DeEtte, together &middot; Boise</p>
    </div>
    <div class="topright">
      <p class="d">Tuesday, Jun 16</p>
      <p class="m">Dad &middot; Sis (RN) &middot; You</p>
    </div>
  </div>
  <div id="view"></div>
</div>
<nav><div class="navinner" id="nav"></div></nav>

<script>
function svg(inner,s){s=s||24;return '<svg xmlns="http://www.w3.org/2000/svg" width="'+s+'" height="'+s+'" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'+inner+'</svg>';}
var ICON={
  home:function(s){return svg('<path d="M3 9.5L12 3l9 6.5"/><path d="M5 9.5V20h14V9.5"/>',s)},
  pill:function(s){return svg('<rect x="3" y="8" width="18" height="8" rx="4"/><line x1="12" y1="8" x2="12" y2="16"/>',s)},
  cal:function(s){return svg('<rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/>',s)},
  users:function(s){return svg('<circle cx="9" cy="8" r="3"/><path d="M3 20c0-3.3 2.7-6 6-6s6 2.7 6 6"/><circle cx="17.5" cy="9" r="2.3"/><path d="M16 14.2c2.3.4 4 2.4 4 4.8"/>',s)},
  plane:function(s){return svg('<path d="M2 12l20-7-7 20-3-8-8-3z"/>',s)},
  life:function(s){return svg('<circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.5"/><line x1="5.6" y1="5.6" x2="9.5" y2="9.5"/><line x1="18.4" y1="5.6" x2="14.5" y2="9.5"/><line x1="5.6" y1="18.4" x2="9.5" y2="14.5"/><line x1="18.4" y1="18.4" x2="14.5" y2="14.5"/>',s)},
  check:function(s){return svg('<path d="M5 12l4 4L19 6"/>',s)},
  clock:function(s){return svg('<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>',s)},
  alert:function(s){return svg('<path d="M12 3l9 16H3z"/><line x1="12" y1="9" x2="12" y2="14"/><line x1="12" y1="16.6" x2="12" y2="16.7"/>',s)},
  plus:function(s){return svg('<line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>',s)},
  phone:function(s){return svg('<path d="M5 4h4l2 5-2 1c1 2 2 3 4 4l1-2 5 2v4c0 1-1 2-2 2A16 16 0 0 1 3 6c0-1 1-2 2-2z"/>',s)},
  mappin:function(s){return svg('<path d="M12 21s7-6 7-11a7 7 0 0 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/>',s)},
  file:function(s){return svg('<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/>',s)},

  h+='</div>';

  h+='<div class="sec">Calendars</div><div class="card">';

  });

  h+='<div class="sec">Agenda &middot; '+MONTHS[m]+' '+y+'</div>';

  } else {

        lastDate=e.date;

    });

  h+='<p class="hint">Tap a day to jump to it. Connect Dad&rsquo;s, Sis&rsquo;s, and your calendars above to layer everyone&rsquo;s plans over DeEtte&rsquo;s.</p>';

}

function viewBenefits(){
  var h='<div class="hero"><div class="sundeco">'+ICON.landmark(86)+'</div><h2>Benefits &amp; financial support</h2><p>Early-onset Alzheimer&rsquo;s opens doors many families miss &mdash; income, coverage, and respite. Applying early matters. Track each one here so all three of you can see what&rsquo;s in motion.</p></div>';
  var stars=[];
  BENEFITS.forEach(function(g){g.items.forEach(function(it){if(it.star)stars.push(it);});});
  h+='<div class="sec first">Start with these four</div><div class="card warm"><ol style="margin:0;padding-left:18px;color:var(--text)">';
  stars.forEach(function(it){h+='<li style="margin:6px 0;font-size:14px"><strong>'+esc(it.title)+'</strong></li>';});
  h+='</ol><p class="sm" style="margin:10px 0 0;color:#6b5b3e">These have the biggest impact. Tap any program below to set its status &mdash; To do, Looking into it, Applied, or Approved &mdash; so the whole family can see progress.</p></div>';
  BENEFITS.forEach(function(g){
    h+='<div class="sec">'+esc(g.group)+'</div>';
    g.items.forEach(function(it){
      var st=state.benefits[it.id]||'todo';
      var s=STATUS[st];
      h+='<div class="ben"><div class="ben-top"><p class="ben-title">'+esc(it.title)+(it.star?'<span class="star">'+ICON.sun(11)+'Start here</span>':'')+'</p><button class="st '+s.cls+'" data-benefit="'+it.id+'">'+s.label+'</button></div>';
      h+='<p class="ben-desc">'+it.desc+'</p>';
      if(it.note){h+='<p class="ben-note">'+it.note+'</p>';}
      if(it.act){h+='<div class="ben-act">';it.act.forEach(function(a){var tel=a.href.indexOf('tel:')===0;h+='<a class="rbtn" href="'+a.href+'"'+(tel?'':' target="_blank" rel="noopener"')+'>'+a.label+'</a>';});h+='</div>';}
      h+='</div>';
    });
  });
  h+='<p class="hint">General information, not legal or financial advice &mdash; confirm eligibility and details with each program. Phone numbers current as of June 2026.</p>';
  return h;
}

function viewResources(){
  var d=state.dad;
  var overdue=d.daysSince>=7;
  var h='<div class="hero"><div class="sundeco">'+ICON.heart(92)+'</div><h2>Caring for the caregiver</h2><p>Dad carries the most each day. Looking after him &mdash; rest, backup, community &mdash; keeps DeEtte well cared for too.</p></div>';

  // Featured: next support group for Dad
  h+='<div class="sec first">Dad&rsquo;s next support group</div>';
  h+='<div class="card event">'
    +'<div class="event-top"><span class="event-date"><span class="mon">JUL</span><span class="day">8</span></span>'
    +'<div><p class="event-title">Eagle Caregiver Support Group</p><p class="event-meta">Wed, July 8, 2026 &middot; 1:00&ndash;3:00 PM MDT</p></div></div>'
    +'<div class="event-row">'+ICON.mappin(16)+'<span>Eagle Senior Center &middot; 312 E State St, Eagle, ID 83616</span></div>'
    +'<div class="event-row">'+ICON.cal(16)+'<span>Meets the 2nd Wednesday of each month, 1&ndash;3 p.m.</span></div>'
    +'<p class="event-desc">A safe, confidential space to share with others who get it, learn about dementia, and pick up practical ways to handle the hard days.</p>'
    +'<div class="event-actions">'
      +'<a class="rbtn" href="https://www.google.com/maps/search/?api=1&amp;query=Eagle%20Senior%20Center%20312%20E%20State%20St%20Eagle%20ID%2083616" target="_blank" rel="noopener">Directions</a>'
      +'<a class="rbtn" href="tel:18002723900">Call to register</a>'
      +'<a class="rbtn" href="https://www.alz.org/idaho" target="_blank" rel="noopener">Chapter site</a>'
    +'</div>'
  +'</div>';

  // Dad wellbeing card
  h+='<div class="sec">Looking after Dad</div>';
  h+='<div class="card"><div class="row" style="align-items:flex-start">'+avatar('Dad')+'<div class="grow"><p style="margin:0;font-weight:600;color:var(--head)">Dad &middot; DeEtte&rsquo;s primary caregiver</p><p class="sm muted" style="margin:3px 0 0">Last real break: '+esc(d.lastBreak)+(d.daysSince>0?' &middot; '+d.daysSince+' days ago':' &middot; today')+'</p></div></div>';
  if(overdue){
    h+='<div class="nudge">A gentle nudge: it&rsquo;s been over a week. Even a few hours off &mdash; a walk, coffee with a friend, a nap &mdash; protects his health, not just hers.</div>';
  }
  h+='<button class="btn" data-action="break" style="margin-top:12px">'+ICON.coffee(16)+' &nbsp;Log a break for Dad today</button>';
  h+='<p class="hint">Worried he seems worn down? Drop a note in Coordination so all three of you see it.</p>';
  h+='</div>';

  // Helplines
  var calls=[
    {icon:'phone',title:"Alzheimer's Association Helpline",sub:'24/7, every day &middot; free &amp; confidential',num:'800-272-3900',tel:'18002723900'},
    {icon:'phone',title:"Alzheimer's Foundation of America",sub:'7 days/week &middot; dementia-trained social workers',num:'866-232-8484',tel:'18662328484'},
    {icon:'mappin',title:'Eldercare Locator',sub:'Find local respite &amp; services near Boise',num:'800-677-1116',tel:'18006771116'}
  ];
  h+='<div class="sec">Talk to someone (free)</div><div class="card flush">';
  calls.forEach(function(c){
    h+='<div class="res"><span class="ibadge">'+ICON[c.icon](16)+'</span><div class="grow"><p class="rtitle">'+c.title+'</p><p class="rsub">'+c.sub+' &middot; <strong>'+c.num+'</strong></p></div><a class="rbtn" href="tel:'+c.tel+'">Call</a></div>';
  });
  h+='</div>';

  // Community
  h+='<div class="sec">Community &amp; support groups</div>';
  h+='<div class="card"><div class="row" style="align-items:flex-start">'+'<span class="ibadge">'+ICON.users2(16)+'</span>'+'<div class="grow"><p style="margin:0;font-weight:600;color:var(--head)">You don&rsquo;t have to do this alone</p><p class="sm muted" style="margin:4px 0 0">Free in-person caregiver support groups meet around the Boise area &mdash; the helpline above can point you to the nearest one. There&rsquo;s also a 24/7 online community for caregivers who get it.</p></div></div><div class="btn-row" style="justify-content:flex-start;margin-top:12px"><a class="rbtn" href="https://www.alzconnected.org" target="_blank" rel="noopener">Open online community</a></div></div>';

  // Learn
  h+='<div class="sec">Learn together</div>';
  h+='<div class="card flush">';
  h+='<div class="res"><span class="ibadge">'+ICON.file(16)+'</span><div class="grow"><p class="rtitle">Alzheimer&rsquo;s Association — Caregiver Center</p><p class="rsub">Stage-by-stage guidance, daily care tips, planning</p></div><a class="rbtn" href="https://www.alz.org/help-support/caregiving" target="_blank" rel="noopener">Open</a></div>';
  h+='<div class="res"><span class="ibadge">'+ICON.heart(16)+'</span><div class="grow"><p class="rtitle">Respite &amp; taking time off</p><p class="rsub">How short breaks work and how to fund them</p></div><a class="rbtn" href="https://www.alz.org/help-support/caregiving/care-options/respite-care" target="_blank" rel="noopener">Open</a></div>';
  h+='</div>';

  h+='<p class="hint">Phone numbers were current as of June 2026. Your local Area Agency on Aging can point you to Boise-specific respite and in-home help.</p>';
  return h;
}

function render(){
  var y=window.scrollY;
  var v=document.getElementById('view');
  if(state.tab==='today')v.innerHTML=viewToday();
  else if(state.tab==='meds')v.innerHTML=viewMeds();
  else if(state.tab==='visits')v.innerHTML=viewVisits();
  else if(state.tab==='coord')v.innerHTML=viewCoord();
  else if(state.tab==='travel')v.innerHTML=viewTravel();
  else if(state.tab==='calendar')v.innerHTML=viewCalendar();
  else if(state.tab==='benefits')v.innerHTML=viewBenefits();
  else v.innerHTML=viewResources();

  var nav=document.getElementById('nav');
  nav.innerHTML=TABS.map(function(t){
    return '<button class="navbtn'+(state.tab===t.id?' active':'')+'" data-tab="'+t.id+'">'+ICON[t.icon](20)+'<span>'+t.label+'</span></button>';
  }).join('');
  window.scrollTo(0,y);
}

document.addEventListener('click',function(e){
  var tabBtn=e.target.closest('[data-tab]');
  if(tabBtn){state.tab=tabBtn.getAttribute('data-tab');state.draft='';render();window.scrollTo(0,0);return;}
  var med=e.target.closest('[data-med]');
  if(med){var id=+med.getAttribute('data-med');state.meds.forEach(function(m){if(m.id===id)m.taken=!m.taken;});render();return;}
  var todo=e.target.closest('[data-todo]');
  if(todo){var tid=+todo.getAttribute('data-todo');state.todos.forEach(function(t){if(t.id===tid)t.done=!t.done;});render();return;}
  var act=e.target.closest('[data-action]');
  if(act && act.getAttribute('data-action')==='break'){state.dad.lastBreak='Today';state.dad.daysSince=0;render();return;}
  var navb=e.target.closest('[data-cal-nav]');
  if(navb){var dir=+navb.getAttribute('data-cal-nav');state.cal.m+=dir;if(state.cal.m<0){state.cal.m=11;state.cal.y--;}if(state.cal.m>11){state.cal.m=0;state.cal.y++;}render();return;}
  var day=e.target.closest('[data-day]');
  if(day){state.cal.sel=day.getAttribute('data-day');render();return;}
  var conn=e.target.closest('[data-connect]');
  if(conn){var cp=conn.getAttribute('data-connect');state.cal.connected[cp]=true;state.cal.shown[cp]=true;state.cal.sync=true;render();return;}
  var tog=e.target.closest('[data-toggle]');
  if(tog){var tp=tog.getAttribute('data-toggle');state.cal.shown[tp]=!state.cal.shown[tp];render();return;}
  var ben=e.target.closest('[data-benefit]');
  if(ben){var bid=ben.getAttribute('data-benefit');var cur=state.benefits[bid]||'todo';var bi=STATUS_ORDER.indexOf(cur);state.benefits[bid]=STATUS_ORDER[(bi+1)%STATUS_ORDER.length];render();return;}
  if(e.target.closest('[data-post]')){
    var ta=document.getElementById('draft');var val=ta?ta.value.trim():'';
    if(val){state.updates.unshift({id:Date.now(),who:'You',when:'Just now',text:val});state.draft='';render();}
    return;
  }
});
document.addEventListener('input',function(e){if(e.target.id==='draft')state.draft=e.target.value;});

render();
</script>
